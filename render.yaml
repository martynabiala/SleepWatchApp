services:
  - type: web
    name: sleepwatch-app
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn sleepwatch_project.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS_EXTRA
        value: "sleepwatch.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://sleepwatch.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: sleepwatch-db
          property: connectionString

databases:
  - name: sleepwatch-db
    plan: free
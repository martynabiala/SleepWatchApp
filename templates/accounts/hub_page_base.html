{% extends "base.html" %}

{% block content %}
<style>
    .hub-page {
        display: grid;
        gap: 24px;
    }

    .hub-hero,
    .hub-card,
    .hub-section {
        border-radius: 28px;
        border: 1px solid rgba(34, 94, 139, 0.12);
        background:
            radial-gradient(circle at top right, rgba(83, 160, 194, 0.12), transparent 28%),
            radial-gradient(circle at bottom left, rgba(141, 200, 255, 0.1), transparent 24%),
            rgba(255, 255, 255, 0.92);
    }

    .hub-hero,
    .hub-section {
        padding: 28px;
    }

    .hub-hero {
        display: grid;
        gap: 20px;
        position: relative;
        overflow: hidden;
    }

    .hub-hero::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 7px;
        background: linear-gradient(90deg, #164e7d, #5ea8c3, #2f7eb2);
    }

    .hub-kicker {
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-dark);
    }

    .hub-hero h1,
    .hub-section h2,
    .hub-card h3 {
        margin: 0;
    }

    .hub-copy {
        margin: 0;
        color: var(--muted);
        max-width: 68ch;
    }

    .hub-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
    }

    .hub-grid-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
    }

    .hub-card {
        padding: 22px;
        display: grid;
        gap: 10px;
    }

    .hub-stat-label,
    .hub-item-label {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 700;
    }

    .hub-stat-value {
        font-size: clamp(1.5rem, 4vw, 2rem);
        line-height: 1.05;
        font-weight: 900;
        color: var(--text);
    }

    .hub-list,
    .hub-timeline,
    .hub-library {
        display: grid;
        gap: 14px;
    }

    .hub-list-item,
    .hub-timeline-item,
    .hub-library-item {
        border-radius: 22px;
        border: 1px solid rgba(34, 94, 139, 0.1);
        background: rgba(255, 255, 255, 0.84);
        padding: 18px 20px;
        display: grid;
        gap: 8px;
    }

    .hub-pill-row,
    .hub-action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .hub-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(22, 78, 125, 0.12);
        color: var(--accent-dark);
        font-size: 0.82rem;
        font-weight: 800;
    }

    .hub-pill-positive {
        background: rgba(87, 184, 144, 0.16);
        color: #246645;
    }

    .hub-pill-warning {
        background: rgba(239, 107, 168, 0.14);
        color: #8f2e5a;
    }

    .hub-pill-neutral {
        background: rgba(22, 78, 125, 0.12);
        color: var(--accent-dark);
    }

    .hub-note {
        color: var(--muted);
        font-size: 0.94rem;
        margin: 0;
    }

    .hub-empty {
        border-radius: 24px;
        border: 1px dashed rgba(34, 94, 139, 0.24);
        background: rgba(255, 255, 255, 0.76);
        padding: 22px;
        color: var(--muted);
    }

    @media (max-width: 920px) {
        .hub-grid,
        .hub-grid-3 {
            grid-template-columns: 1fr;
        }
    }

    :root[data-theme="dark"] .hub-hero,
    :root[data-theme="dark"] .hub-card,
    :root[data-theme="dark"] .hub-section,
    :root[data-theme="dark"] .hub-list-item,
    :root[data-theme="dark"] .hub-timeline-item,
    :root[data-theme="dark"] .hub-library-item,
    :root[data-theme="dark"] .hub-empty {
        border-color: rgba(124, 164, 200, 0.16);
        background:
            radial-gradient(circle at top right, rgba(94, 152, 204, 0.1), transparent 28%),
            rgba(24, 39, 59, 0.94);
    }

    :root[data-theme="dark"] .hub-pill {
        background: rgba(94, 152, 204, 0.14);
        color: #dcecff;
    }
</style>

<div class="hub-page">
    {% block hub_body %}{% endblock %}
</div>
{% endblock %}
